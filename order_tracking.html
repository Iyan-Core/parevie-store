<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lacak Pesanan - Pareffi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --primary: #1a1a2e;
      --accent: #c9a84c;
      --accent-light: #e8d5a3;
      --bg: #f7f5f0;
      --white: #fff;
      --text: #2c2c2c;
      --text-light: #888;
      --border: #e0ddd6;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 14px;
      --success: #2a9d8f;
      --error: #e63946;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--primary);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .back-btn { color: rgba(255,255,255,0.85); font-size: 20px; text-decoration: none; }
    .header h1 { font-size: 16px; font-weight: 700; color: var(--white); letter-spacing: 1px; flex: 1; }

    .container { max-width: 480px; margin: 0 auto; padding: 16px 14px; }

    /* SECTION */
    .section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .section-title {
      font-size: 11px; font-weight: 700;
      color: var(--text-light); text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
      position: relative;
    }
    .section-title::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 28px; height: 2px; background: var(--accent); border-radius: 2px;
    }

    /* DAFTAR ORDER */
    .order-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .order-card:hover { box-shadow: var(--shadow); }

    .order-card-header {
      background: var(--bg);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .order-id { font-size: 12px; font-weight: 700; color: var(--primary); }
    .order-date { font-size: 11px; color: var(--text-light); }

    .order-card-body { padding: 12px 14px; }

    .order-items-preview {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .order-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .order-total {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
    }

    /* STATUS BADGE */
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-pending  { background: rgba(255,193,7,0.15);  color: #f59e0b; border: 1px solid rgba(255,193,7,0.3); }
    .status-process  { background: rgba(59,130,246,0.12); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
    .status-sent     { background: rgba(139,92,246,0.12); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.3); }
    .status-received { background: rgba(42,157,143,0.12); color: var(--success); border: 1px solid rgba(42,157,143,0.3); }
    .status-cancelled{ background: rgba(230,57,70,0.12);  color: var(--error); border: 1px solid rgba(230,57,70,0.3); }

    /* MODAL DETAIL ORDER */
    #orderModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 9998;
      align-items: flex-end; justify-content: center;
    }
    #orderModal.show { display: flex; }
    .modal-sheet {
      background: var(--white); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px; max-height: 90vh;
      display: flex; flex-direction: column;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-topbar span { font-size: 12px; font-weight: 700; color: var(--text-light); letter-spacing: 1.5px; text-transform: uppercase; }
    .modal-close {
      background: var(--bg); border: 1px solid var(--border);
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 14px; cursor: pointer; color: #555;
      display: flex; align-items: center; justify-content: center;
    }
    #modalBody { overflow-y: auto; padding: 20px; }

    /* TIMELINE STATUS */
    .timeline { margin: 16px 0; }
    .timeline-item {
      display: flex; gap: 14px; margin-bottom: 0;
      position: relative;
    }
    .timeline-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 15px; top: 32px;
      width: 2px; height: calc(100% + 4px);
      background: var(--border);
    }
    .timeline-item.done::before { background: var(--accent); }

    .timeline-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
      background: var(--bg); border: 2px solid var(--border);
      color: var(--text-light);
    }
    .timeline-item.done .timeline-dot {
      background: var(--accent); border-color: var(--accent);
      color: var(--primary);
    }
    .timeline-item.active .timeline-dot {
      background: var(--primary); border-color: var(--primary);
      color: var(--white);
    }

    .timeline-content { flex: 1; padding-bottom: 20px; }
    .timeline-label { font-size: 13px; font-weight: 700; color: var(--text); }
    .timeline-desc  { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .timeline-time  { font-size: 11px; color: var(--accent); margin-top: 2px; }

    /* ORDER DETAIL INFO */
    .detail-row {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--bg);
      font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-light); }
    .detail-val   { font-weight: 600; color: var(--text); text-align: right; max-width: 60%; }

    /* PRODUK LIST */
    .item-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--bg);
    }
    .item-img {
      width: 48px; height: 48px; border-radius: 8px;
      object-fit: cover; background: var(--bg);
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .item-info { flex: 1; }
    .item-name  { font-size: 13px; font-weight: 600; }
    .item-qty   { font-size: 12px; color: var(--text-light); }
    .item-price { font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

    /* TOTAL BOX */
    .total-box {
      background: var(--bg); border-radius: 10px;
      padding: 12px 14px; margin-top: 12px;
    }
    .total-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--text-light); margin-bottom: 6px;
    }
    .total-grand {
      display: flex; justify-content: space-between;
      font-size: 16px; font-weight: 700; color: var(--primary);
      padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px;
    }

    /* KONFIRMASI TERIMA */
    .btn-confirm {
      width: 100%; padding: 13px;
      background: var(--success); color: var(--white);
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      margin-top: 16px; transition: background 0.2s;
    }
    .btn-confirm:hover { background: #238c7f; }

    /* LOADING & EMPTY */
    .loading { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty i { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.3; }
    .empty a {
      display: inline-block; margin-top: 16px; padding: 10px 24px;
      background: var(--primary); color: var(--white);
      border-radius: 20px; text-decoration: none; font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <a href="profile.html" class="back-btn">&#8592;</a>
    <h1>Pesanan Saya</h1>
  </div>

  <!-- MODAL DETAIL -->
  <div id="orderModal" onclick="if(event.target===this)this.classList.remove('show')">
    <div class="modal-sheet">
      <div class="modal-topbar">
        <span>Detail Pesanan</span>
        <button class="modal-close" onclick="document.getElementById('orderModal').classList.remove('show')">X</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="container">

    <!-- FILTER STATUS -->
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px;">
      <button class="status-badge status-pending" style="cursor:pointer;white-space:nowrap;"
        onclick="filterStatus('all', this)">Semua</button>
      <button class="status-badge status-pending" style="cursor:pointer;white-space:nowrap;"
        onclick="filterStatus('pending', this)">Menunggu</button>
      <button class="status-badge status-process" style="cursor:pointer;white-space:nowrap;"
        onclick="filterStatus('process', this)">Diproses</button>
      <button class="status-badge status-sent" style="cursor:pointer;white-space:nowrap;"
        onclick="filterStatus('sent', this)">Dikirim</button>
      <button class="status-badge status-received" style="cursor:pointer;white-space:nowrap;"
        onclick="filterStatus('received', this)">Selesai</button>
    </div>

    <!-- DAFTAR ORDER -->
    <div id="orderList">
      <div class="loading">
        <div class="spinner"></div>
        <p>Memuat pesanan...</p>
      </div>
    </div>

  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, query, where,
      orderBy, getDocs, doc, updateDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIza...",
      authDomain: "pareffi-store.firebaseapp.com",
      projectId: "pareffi-store",
      storageBucket: "pareffi-store.firebasestorage.app",
      messagingSenderId: "673404128533",
      appId: "1:673404128533:web:325b2f82825e8c4697ed1c"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allOrders      = [];
    let activeStatus   = 'all';
    let currentUser    = null;

    // Status config
    const statusConfig = {
      pending  : { label: 'Menunggu Pembayaran', class: 'status-pending',  icon: 'fa-clock' },
      process  : { label: 'Sedang Diproses',     class: 'status-process',  icon: 'fa-box-open' },
      sent     : { label: 'Dalam Pengiriman',     class: 'status-sent',     icon: 'fa-truck' },
      received : { label: 'Pesanan Selesai',      class: 'status-received', icon: 'fa-circle-check' },
      cancelled: { label: 'Dibatalkan',           class: 'status-cancelled',icon: 'fa-circle-xmark' },
    };

    // Timeline steps
    const timelineSteps = [
      { key: 'pending',  label: 'Pesanan Dibuat',       desc: 'Menunggu konfirmasi pembayaran', icon: 'fa-receipt' },
      { key: 'process',  label: 'Sedang Diproses',      desc: 'Pesanan sedang dikemas',          icon: 'fa-box-open' },
      { key: 'sent',     label: 'Dalam Pengiriman',     desc: 'Paket sudah dikirim',             icon: 'fa-truck' },
      { key: 'received', label: 'Pesanan Diterima',     desc: 'Pesanan telah sampai',            icon: 'fa-circle-check' },
    ];
    const statusOrder = ['pending','process','sent','received'];

    // ==============================
    // CEK LOGIN
    // ==============================
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      await loadOrders(user.uid);
    });

    // ==============================
    // LOAD ORDERS
    // ==============================
    async function loadOrders(uid) {
      try {
        const q    = query(
          collection(db, "orders"),
          where("uid", "==", uid),
          orderBy("createdAt", "desc")
        );
        const snap = await getDocs(q);
        allOrders  = [];
        snap.forEach(d => allOrders.push({ id: d.id, ...d.data() }));
        renderOrders(allOrders);
      } catch (err) {
        document.getElementById('orderList').innerHTML = `
          <div class="empty"><i class="fas fa-exclamation-circle"></i>
          <p>Gagal memuat pesanan.</p></div>`;
      }
    }

    // ==============================
    // FILTER STATUS
    // ==============================
    window.filterStatus = function(status, btn) {
      activeStatus = status;
      renderOrders(status === 'all' ? allOrders : allOrders.filter(o => o.status === status));
    };

    // ==============================
    // RENDER ORDERS
    // ==============================
    function renderOrders(orders) {
      const list = document.getElementById('orderList');
      if (!orders.length) {
        list.innerHTML = `
          <div class="empty">
            <i class="fas fa-box-open"></i>
            <p>Belum ada pesanan.</p>
            <a href="store.html">Belanja Sekarang</a>
          </div>`;
        return;
      }

      list.innerHTML = orders.map(o => {
        const cfg     = statusConfig[o.status] || statusConfig.pending;
        const items   = (o.items || []).map(i => i.name).join(', ');
        let dateStr   = '';
        if (o.createdAt?.toDate) {
          dateStr = o.createdAt.toDate().toLocaleDateString('id-ID', {
            day: 'numeric', month: 'short', year: 'numeric'
          });
        }
        return `
          <div class="order-card" onclick="showDetail('${o.id}')">
            <div class="order-card-header">
              <div>
                <div class="order-id">${o.orderId || o.id}</div>
                <div class="order-date">${dateStr}</div>
              </div>
              <span class="status-badge ${cfg.class}">${cfg.label}</span>
            </div>
            <div class="order-card-body">
              <div class="order-items-preview">${items || 'Produk'}</div>
              <div class="order-footer">
                <span class="order-total">Rp ${Number(o.total || 0).toLocaleString('id-ID')}</span>
                <span style="font-size:12px;color:var(--accent);">Lihat Detail <i class="fas fa-chevron-right"></i></span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ==============================
    // SHOW DETAIL MODAL
    // ==============================
    window.showDetail = function(orderId) {
      const o = allOrders.find(x => x.id === orderId);
      if (!o) return;

      const cfg       = statusConfig[o.status] || statusConfig.pending;
      const curIdx    = statusOrder.indexOf(o.status);
      const shipping  = o.shipping || {};
      let dateStr     = '';
      if (o.createdAt?.toDate) {
        dateStr = o.createdAt.toDate().toLocaleDateString('id-ID', {
          day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
      }

      // Timeline
      const timelineHtml = timelineSteps.map((step, idx) => {
        const isDone   = idx < curIdx;
        const isActive = idx === curIdx;
        return `
          <div class="timeline-item ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}">
            <div class="timeline-dot"><i class="fas ${step.icon}"></i></div>
            <div class="timeline-content">
              <div class="timeline-label">${step.label}</div>
              <div class="timeline-desc">${step.desc}</div>
              ${isActive && dateStr ? `<div class="timeline-time">${dateStr}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      // Produk items
      const itemsHtml = (o.items || []).map(item => `
        <div class="item-row">
          <img src="${item.image || ''}" class="item-img" alt="${item.name}"
            onerror="this.style.display='none'">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-qty">x${item.quantity}</div>
          </div>
          <div class="item-price">Rp ${Number(item.price * item.quantity).toLocaleString('id-ID')}</div>
        </div>`).join('');

      // Tombol konfirmasi jika status sent
      const confirmBtn = o.status === 'sent' ? `
        <button class="btn-confirm" onclick="confirmReceived('${o.id}')">
          <i class="fas fa-circle-check"></i> Konfirmasi Pesanan Diterima
        </button>` : '';

      document.getElementById('modalBody').innerHTML = `
        <!-- Status -->
        <div style="text-align:center;margin-bottom:16px;">
          <span class="status-badge ${cfg.class}" style="font-size:13px;padding:6px 18px;">${cfg.label}</span>
        </div>

        <!-- Timeline -->
        <div class="section-title">Status Pengiriman</div>
        <div class="timeline">${timelineHtml}</div>

        <!-- Info Pengiriman -->
        <div class="section-title" style="margin-top:4px;">Info Pengiriman</div>
        <div class="detail-row"><span class="detail-label">Penerima</span><span class="detail-val">${shipping.nama || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">Telepon</span><span class="detail-val">${shipping.telepon || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">Alamat</span><span class="detail-val">${shipping.alamat || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">Ekspedisi</span><span class="detail-val">${(shipping.ekspedisi || '-').toUpperCase()}</span></div>
        <div class="detail-row"><span class="detail-label">Pembayaran</span><span class="detail-val">${o.payment?.method || '-'}</span></div>

        <!-- Produk -->
        <div class="section-title" style="margin-top:16px;">Produk Dipesan</div>
        ${itemsHtml}

        <!-- Total -->
        <div class="total-box">
          <div class="total-row"><span>Subtotal</span><span>Rp ${Number(o.subtotal||0).toLocaleString('id-ID')}</span></div>
          <div class="total-row"><span>Ongkir</span><span>Rp ${Number(o.shippingCost||0).toLocaleString('id-ID')}</span></div>
          <div class="total-grand"><span>Total</span><span>Rp ${Number(o.total||0).toLocaleString('id-ID')}</span></div>
        </div>

        ${confirmBtn}
      `;

      document.getElementById('orderModal').classList.add('show');
    };

    // ==============================
    // KONFIRMASI TERIMA
    // ==============================
    window.confirmReceived = async function(orderId) {
      if (!confirm('Konfirmasi pesanan sudah diterima?')) return;
      try {
        await updateDoc(doc(db, "orders", orderId), {
          status: 'received',
          receivedAt: serverTimestamp()
        });
        // Update local
        const o = allOrders.find(x => x.id === orderId);
        if (o) o.status = 'received';
        document.getElementById('orderModal').classList.remove('show');
        renderOrders(allOrders);
        alert('Terima kasih! Pesanan dikonfirmasi diterima.');
      } catch (err) {
        alert('Gagal konfirmasi. Coba lagi.');
      }
    };

  </script>
</body>
</html>
