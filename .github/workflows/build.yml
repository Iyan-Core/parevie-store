name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: DEBUG - Lihat struktur folder
        run: ls -la

      - name: DEBUG - Lihat isi settings.gradle
        run: cat settings.gradle

      - name: DEBUG - Lihat folder app
        run: ls -la app/ || echo "FOLDER APP TIDAK ADA!"

      - name: DEBUG - Lihat projects Gradle
        run: gradle projects

      - name: Build APK
        run: gradle :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: parevie-store-debug
          path: app/build/outputs/apk/debug/*.apk
