<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Pareffi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --primary: #1a1a2e;
      --accent: #c9a84c;
      --accent-light: #e8d5a3;
      --bg: #f7f5f0;
      --white: #ffffff;
      --text: #2c2c2c;
      --text-light: #888888;
      --border: #e0ddd6;
      --error: #e63946;
      --success: #2a9d8f;
      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    /* HEADER */
    .form-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4e 100%);
      border-radius: var(--radius) var(--radius) 0 0;
      border-bottom: 2px solid var(--accent);
      padding: 32px 24px 22px;
      text-align: center;
    }

    .logo-mark {
      font-size: 26px;
      color: var(--accent);
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    .form-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .form-header p {
      font-size: 12px;
      color: var(--accent-light);
      font-style: italic;
    }

    /* FORM BODY */
    .form-body {
      background: var(--white);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    /* PESAN GLOBAL */
    .msg-box {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg-error {
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.3);
      color: var(--error);
    }
    .msg-success {
      background: rgba(42,157,143,0.08);
      border: 1px solid rgba(42,157,143,0.3);
      color: var(--success);
    }

    /* INVALID TOKEN */
    .invalid-token {
      text-align: center;
      padding: 24px;
      color: var(--error);
      font-size: 14px;
    }
    .invalid-token i {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }
    .invalid-token a {
      display: inline-block;
      margin-top: 16px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }

    /* FORM GROUP */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .form-group label i {
      margin-right: 5px;
      color: var(--accent);
    }

    .input-wrap {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 11px 42px 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
      background: var(--white);
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-light);
      font-size: 14px;
    }

    .toggle-pw:hover { color: var(--accent); }

    .error-message {
      font-size: 11px;
      color: var(--error);
      margin-top: 4px;
      min-height: 14px;
    }

    /* PASSWORD STRENGTH */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-text {
      font-size: 11px;
      margin-top: 3px;
      color: var(--text-light);
    }

    /* TOMBOL */
    #btnReset {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      margin-bottom: 14px;
    }

    #btnReset:hover { background: var(--accent); color: var(--primary); }
    #btnReset:active { transform: scale(0.98); }
    #btnReset:disabled {
      background: var(--border);
      color: var(--text-light);
      cursor: not-allowed;
    }

    .back-link {
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
    }
    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link a:hover { text-decoration: underline; }

    @media (max-width: 380px) {
      .form-body { padding: 20px 14px; }
      .form-header { padding: 24px 14px 18px; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <div class="form-header">
      <div class="logo-mark">✦</div>
      <h1>Reset Password</h1>
      <p>Buat password baru untuk akun Pareffi kamu</p>
    </div>

    <!-- FORM BODY -->
    <div class="form-body" id="formBody">

      <!-- Pesan global -->
      <div id="msgError" class="msg-box msg-error"></div>
      <div id="msgSuccess" class="msg-box msg-success"></div>

      <!-- Form -->
      <div id="formContent">

        <div class="form-group">
          <label for="newPassword"><i class="fa fa-lock"></i> Password Baru</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" placeholder="Minimal 6 karakter" />
            <span class="toggle-pw" onclick="togglePw('newPassword')"><i class="fa fa-eye"></i></span>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-text" id="strengthText"></div>
          <div id="newPassword-error" class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword"><i class="fa fa-lock"></i> Konfirmasi Password</label>
          <div class="input-wrap">
            <input type="password" id="confirmPassword" placeholder="Ulangi password baru" />
            <span class="toggle-pw" onclick="togglePw('confirmPassword')"><i class="fa fa-eye"></i></span>
          </div>
          <div id="confirmPassword-error" class="error-message"></div>
        </div>

        <button id="btnReset" type="button">Reset Password</button>

        <p class="back-link"><a href="login.html"><i class="fa fa-arrow-left"></i> Kembali ke Login</a></p>
      </div>

    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      verifyPasswordResetCode,
      confirmPasswordReset
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIza...",
      authDomain: "pareffi-store.firebaseapp.com",
      projectId: "pareffi-store",
      storageBucket: "pareffi-store.firebasestorage.app",
      messagingSenderId: "673404128533",
      appId: "1:673404128533:web:325b2f82825e8c4697ed1c"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Elemen
    const msgError   = document.getElementById('msgError');
    const msgSuccess = document.getElementById('msgSuccess');
    const btnReset   = document.getElementById('btnReset');
    const formContent = document.getElementById('formContent');

    // ==============================
    // AMBIL oobCode DARI URL
    // Firebase kirim link reset berisi ?oobCode=xxx&mode=resetPassword
    // ==============================
    const urlParams = new URLSearchParams(window.location.search);
    const oobCode   = urlParams.get('oobCode');
    const mode      = urlParams.get('mode');

    // Jika tidak ada oobCode atau mode salah — tampilkan error
    if (!oobCode || mode !== 'resetPassword') {
      formContent.innerHTML = `
        <div class="invalid-token">
          <i class="fa fa-exclamation-circle"></i>
          <p>Link reset password tidak valid atau sudah kadaluarsa.</p>
          <p style="font-size:12px;margin-top:8px;color:#888;">
            Silakan minta link reset password baru dari halaman login.
          </p>
          <a href="login.html"><i class="fa fa-arrow-left"></i> Kembali ke Login</a>
        </div>`;
    } else {
      // Verifikasi oobCode ke Firebase dulu
      verifyPasswordResetCode(auth, oobCode)
        .catch(() => {
          formContent.innerHTML = `
            <div class="invalid-token">
              <i class="fa fa-exclamation-circle"></i>
              <p>Link reset password sudah kadaluarsa atau tidak valid.</p>
              <a href="login.html"><i class="fa fa-arrow-left"></i> Kembali ke Login</a>
            </div>`;
        });
    }

    // ==============================
    // PASSWORD STRENGTH
    // ==============================
    document.getElementById('newPassword').addEventListener('input', function () {
      const val = this.value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const levels = [
        { pct: '0%',   color: '',          label: '' },
        { pct: '25%',  color: '#e63946',   label: 'Sangat Lemah' },
        { pct: '50%',  color: '#f4a261',   label: 'Lemah' },
        { pct: '75%',  color: '#e9c46a',   label: 'Cukup' },
        { pct: '90%',  color: '#2a9d8f',   label: 'Kuat' },
        { pct: '100%', color: '#2a9d8f',   label: 'Sangat Kuat' },
      ];

      const lv = levels[strength] || levels[0];
      fill.style.width = lv.pct;
      fill.style.background = lv.color;
      text.textContent = lv.label;
      text.style.color = lv.color;
    });

    // ==============================
    // TOMBOL RESET
    // ==============================
    btnReset && btnReset.addEventListener('click', async () => {
      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Reset error
      document.getElementById('newPassword-error').textContent = '';
      document.getElementById('confirmPassword-error').textContent = '';
      msgError.style.display = 'none';

      // Validasi
      let valid = true;
      if (!newPassword) {
        document.getElementById('newPassword-error').textContent = 'Password baru harus diisi.';
        valid = false;
      } else if (newPassword.length < 6) {
        document.getElementById('newPassword-error').textContent = 'Password minimal 6 karakter.';
        valid = false;
      }
      if (!confirmPassword) {
        document.getElementById('confirmPassword-error').textContent = 'Konfirmasi password harus diisi.';
        valid = false;
      } else if (confirmPassword !== newPassword) {
        document.getElementById('confirmPassword-error').textContent = 'Password tidak cocok.';
        valid = false;
      }
      if (!valid) return;

      btnReset.textContent = 'Memproses...';
      btnReset.disabled = true;

      try {
        // Konfirmasi reset password ke Firebase
        await confirmPasswordReset(auth, oobCode, newPassword);

        // Tampilkan sukses
        msgSuccess.textContent = '✅ Password berhasil direset! Mengalihkan ke login...';
        msgSuccess.style.display = 'block';

        // Sembunyikan form
        document.querySelector('.form-group') && 
          document.querySelectorAll('.form-group').forEach(el => el.style.display = 'none');
        btnReset.style.display = 'none';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2500);

      } catch (error) {
        const errMap = {
          'auth/expired-action-code' : 'Link reset sudah kadaluarsa. Minta link baru.',
          'auth/invalid-action-code' : 'Link reset tidak valid.',
          'auth/weak-password'       : 'Password terlalu lemah. Gunakan minimal 6 karakter.',
          'auth/user-disabled'       : 'Akun ini telah dinonaktifkan.'
        };
        msgError.textContent = errMap[error.code] || 'Gagal reset password. Coba lagi.';
        msgError.style.display = 'block';
        btnReset.textContent = 'Reset Password';
        btnReset.disabled = false;
      }
    });

  </script>

  <!-- Toggle password visibility -->
  <script>
    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
