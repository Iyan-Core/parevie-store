  <!DOCTYPE html>
  <html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja - Pareffi</title>
    <link rel="stylesheet" href="./css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
  
    <!-- Toast -->
    <div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:#1a1a2e;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;
      display:none;z-index:1000;white-space:nowrap;"></div>
  
    <div class="cart-container">
  
      <!-- Header -->
      <div class="cart-header">
        <a href="store.html" class="back-btn">
          <i class="fa fa-arrow-left"></i>
        </a>
        <h1>Keranjang Belanja</h1>
        <span id="cartItemCount" class="cart-count-badge">0</span>
      </div>
  
      <!-- Loading -->
      <div id="loadingState" style="text-align:center;padding:40px 20px;color:#aaa;">
        <i class="fa fa-spinner fa-spin" style="font-size:24px;margin-bottom:10px;display:block;"></i>
        Memuat keranjang...
      </div>
  
      <!-- Tabel Cart -->
      <table class="cart-items-table" id="cart-items-table" style="display:none;">
        <thead>
          <tr>
            <th>Produk</th>
            <th>Harga</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
  
      <!-- Summary -->
      <div class="cart-summary" id="cartSummary" style="display:none;">
        <div class="summary-row">
          <span>Subtotal (<span id="totalItems">0</span> item)</span>
          <span id="cart-subtotal">Rp0</span>
        </div>
        <div class="summary-row">
          <span>Ongkir</span>
          <span id="cart-ongkir">Rp0</span>
        </div>
        <div class="cart-total">
          <span>Total</span>
          <span id="cart-total-price">Rp0</span>
        </div>
        <a href="checkout.html" class="checkout-button" id="checkoutBtn">
          <i class="fa fa-shopping-bag"></i> Checkout
        </a>
        <button class="btn-clear" id="btnClearCart">
          <i class="fa fa-trash"></i> Kosongkan Keranjang
        </button>
      </div>
  
    </div>
  
    <!-- FIREBASE -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        updateDoc,
        deleteDoc,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  
      const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "pareffi-store.firebaseapp.com",
        projectId: "pareffi-store",
        storageBucket: "pareffi-store.firebasestorage.app",
        messagingSenderId: "673404128533",
        appId: "1:673404128533:web:325b2f82825e8c4697ed1c"
      };
  
      const app  = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db   = getFirestore(app);
  
      let currentUser = null;
      let cart        = [];
  
      // ==============================
      // CEK LOGIN
      // ==============================
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          // Tidak login — pakai localStorage cart saja
          cart = JSON.parse(localStorage.getItem('cart')) || [];
          renderCart();
          return;
        }
        currentUser = user;
        await loadCartFromFirestore(user.uid);
      });
  
      // ==============================
      // LOAD CART DARI FIRESTORE
      // ==============================
      async function loadCartFromFirestore(uid) {
        try {
          const docSnap = await getDoc(doc(db, "carts", uid));
          if (docSnap.exists()) {
            cart = docSnap.data().items || [];
          } else {
            // Cek apakah ada cart di localStorage lalu migrate
            const localCart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = localCart;
            if (cart.length > 0) await saveCartToFirestore();
          }
        } catch (err) {
          console.error('Gagal load cart:', err);
          cart = JSON.parse(localStorage.getItem('cart')) || [];
        }
        renderCart();
      }
  
      // ==============================
      // SIMPAN CART KE FIRESTORE
      // ==============================
      async function saveCartToFirestore() {
        if (!currentUser) {
          localStorage.setItem('cart', JSON.stringify(cart));
          return;
        }
        try {
          await setDoc(doc(db, "carts", currentUser.uid), {
            items    : cart,
            updatedAt: serverTimestamp()
          });
          // Sync ke localStorage juga
          localStorage.setItem('cart', JSON.stringify(cart));
        } catch (err) {
          console.error('Gagal simpan cart:', err);
        }
      }
  
      // ==============================
      // RENDER CART
      // ==============================
      function renderCart() {
        document.getElementById('loadingState').style.display = 'none';
  
        const tbody   = document.querySelector('#cart-items-table tbody');
        const table   = document.getElementById('cart-items-table');
        const summary = document.getElementById('cartSummary');
  
        tbody.innerHTML = '';
  
        if (cart.length === 0) {
          table.style.display = 'none';
          summary.style.display = 'none';
          tbody.innerHTML = '';
          document.getElementById('loadingState').style.display = 'block';
          document.getElementById('loadingState').innerHTML = `
            <div style="padding:60px 20px;text-align:center;color:#aaa;">
              <i class="fa fa-shopping-cart" style="font-size:48px;margin-bottom:16px;display:block;opacity:0.3;"></i>
              <p style="font-size:14px;">Keranjang kamu kosong</p>
              <a href="store.html" style="display:inline-block;margin-top:16px;padding:10px 24px;
                background:#1a1a2e;color:#fff;border-radius:20px;text-decoration:none;font-size:13px;">
                Belanja Sekarang
              </a>
            </div>`;
          updateBadge();
          return;
        }
  
        table.style.display = 'table';
        summary.style.display = 'block';
  
        let subtotal   = 0;
        let totalItems = 0;
  
        cart.forEach((item, index) => {
          const itemTotal = item.price * item.quantity;
          subtotal   += itemTotal;
          totalItems += item.quantity;
  
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>
              <div class="cart-item-details">
                <img src="${item.image || 'https://i.imgur.com/l1530bX.jpg'}"
                  alt="${item.name}"
                  onerror="this.src='./img/no-image.png'">
                <span>${item.name}</span>
              </div>
              <div class="cart-item-quantity-container">
                <div class="cart-item-quantity">
                  <button class="decrease-quantity" data-index="${index}">−</button>
                  <span>${item.quantity}</span>
                  <button class="increase-quantity" data-index="${index}">+</button>
                </div>
                <button class="cart-item-remove" data-index="${index}">
                  <i class="fa fa-trash"></i> Hapus
                </button>
              </div>
            </td>
            <td style="text-align:right;vertical-align:top;">
              Rp${Number(item.price).toLocaleString('id-ID')}
            </td>
            <td style="text-align:right;vertical-align:top;font-weight:700;">
              Rp${Number(itemTotal).toLocaleString('id-ID')}
            </td>
          `;
          tbody.appendChild(row);
        });
  
        // Hitung ongkir (gratis di atas 200rb)
        const ongkir = subtotal >= 200000 ? 0 : 15000;
        const total  = subtotal + ongkir;
  
        document.getElementById('totalItems').textContent    = totalItems;
        document.getElementById('cart-subtotal').textContent = 'Rp' + subtotal.toLocaleString('id-ID');
        document.getElementById('cart-ongkir').textContent   = ongkir === 0
          ? '<span style="color:#2a9d8f;">GRATIS</span>'
          : 'Rp' + ongkir.toLocaleString('id-ID');
        document.getElementById('cart-ongkir').innerHTML = ongkir === 0
          ? '<span style="color:#2a9d8f;font-weight:700;">GRATIS</span>'
          : 'Rp' + ongkir.toLocaleString('id-ID');
        document.getElementById('cart-total-price').textContent = 'Rp' + total.toLocaleString('id-ID');
  
        updateBadge();
      }
  
      function updateBadge() {
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById('cartItemCount').textContent = total;
      }
  
      // ==============================
      // EVENT — TAMBAH / KURANG / HAPUS
      // ==============================
      document.querySelector('#cart-items-table tbody').addEventListener('click', async (e) => {
        const target = e.target.closest('button');
        if (!target) return;
  
        const index = parseInt(target.dataset.index);
        if (isNaN(index)) return;
  
        if (target.classList.contains('increase-quantity')) {
          cart[index].quantity++;
        } else if (target.classList.contains('decrease-quantity')) {
          if (cart[index].quantity > 1) {
            cart[index].quantity--;
          } else {
            cart.splice(index, 1);
          }
        } else if (target.classList.contains('cart-item-remove')) {
          cart.splice(index, 1);
          showToast('Item dihapus dari keranjang');
        }
  
        await saveCartToFirestore();
        renderCart();
      });
  
      // ==============================
      // KOSONGKAN KERANJANG
      // ==============================
      document.getElementById('btnClearCart').addEventListener('click', async () => {
        if (!confirm('Kosongkan semua item dari keranjang?')) return;
        cart = [];
        await saveCartToFirestore();
        renderCart();
        showToast('Keranjang dikosongkan');
      });
  
      // ==============================
      // TOAST
      // ==============================
      function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
      }
  
    </script>
  </body>
  </html>
