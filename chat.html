<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elara - Pareffi Assistant</title>
  <link rel="stylesheet" href="./css/el.css">
</head>
<body>

  <div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <a href="index.html" class="back-btn">&#8592;</a>
        <div class="elara-avatar">✦</div>
        <div class="elara-info">
          <div class="elara-name">Elara</div>
          <div class="elara-status" id="elaraStatus">Pareffi Assistant</div>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn" title="Hapus riwayat">🗑</button>
    </div>

    <!-- Chat Box -->
    <div id="chatBox" class="chat-box">
      <!-- Pesan sambutan -->
      <div class="message elara-msg">
        <div class="bubble">
          Halo! Saya <strong>Elara</strong>, asisten parfum Pareffi. 🌸<br><br>
          Tanya saya tentang:<br>
          • Rekomendasi parfum<br>
          • Aroma & notes<br>
          • Cara pakai & penyimpanan<br>
          • Produk Pareffi
        </div>
        <div class="msg-time">Elara</div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <textarea
        id="userInput"
        placeholder="Tanya seputar parfum..."
        rows="1"
      ></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <span id="sendIcon">➤</span>
      </button>
    </div>

  </div>

  <!-- FIREBASE AUTH CEK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      limit,
      getDocs,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIza...",
      authDomain: "pareffi-store.firebaseapp.com",
      projectId: "pareffi-store",
      storageBucket: "pareffi-store.firebasestorage.app",
      messagingSenderId: "673404128533",
      appId: "1:673404128533:web:325b2f82825e8c4697ed1c"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser  = null;
    let chatHistory  = []; // Riwayat untuk konteks AI

    // ==============================
    // CEK LOGIN
    // ==============================
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        // Load riwayat chat terakhir dari Firestore
        await loadChatHistory(user.uid);
      }
    });

    // ==============================
    // LOAD RIWAYAT CHAT
    // ==============================
    async function loadChatHistory(uid) {
      try {
        const q = query(
          collection(db, "chats", uid, "messages"),
          orderBy("createdAt", "desc"),
          limit(10)
        );
        const snap = await getDocs(q);
        const messages = [];
        snap.forEach(d => messages.unshift(d.data()));

        // Render pesan lama
        messages.forEach(msg => {
          if (msg.role === 'user') {
            appendMessage('user', msg.content);
          } else {
            appendMessage('elara', msg.content);
          }
          // Tambah ke history AI
          chatHistory.push({ role: msg.role, content: msg.content });
        });

      } catch (err) {
        console.error('Gagal load history:', err);
      }
    }

    // ==============================
    // SIMPAN PESAN KE FIRESTORE
    // ==============================
    async function saveMessage(role, content) {
      if (!currentUser) return;
      try {
        await addDoc(collection(db, "chats", currentUser.uid, "messages"), {
          role, content, createdAt: serverTimestamp()
        });
      } catch (err) {
        console.error('Gagal simpan pesan:', err);
      }
    }

    // ==============================
    // KIRIM PESAN KE CLAUDE API
    // ==============================
    window.sendMessage = async function () {
      const input   = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;

      // Tampilkan pesan user
      appendMessage('user', message);
      input.value = '';
      autoResize(input);

      // Tambah ke history
      chatHistory.push({ role: 'user', content: message });

      // Simpan ke Firestore
      await saveMessage('user', message);

      // Loading state
      setLoading(true);

      try {
        // Panggil Claude API
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': 'MASUKKAN_API_KEY_CLAUDE_KAMU', // Ganti dengan API key Claude
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 500,
            system: `Kamu adalah Elara, asisten parfum dari toko Pareffi. 
Kamu ahli dalam dunia parfum, aroma, notes, dan produk Pareffi.
Jawab dengan ramah, singkat, dan informatif dalam bahasa Indonesia.
Fokus hanya pada topik parfum, kecantikan, dan produk Pareffi.
Jika ditanya di luar topik parfum, arahkan kembali ke topik parfum.`,
            messages: chatHistory.slice(-10) // Kirim 10 pesan terakhir sebagai konteks
          })
        });

        const data    = await response.json();
        const reply   = data.content?.[0]?.text || 'Maaf, saya tidak bisa menjawab saat ini.';

        // Tampilkan balasan
        appendMessage('elara', reply);

        // Tambah ke history & simpan
        chatHistory.push({ role: 'assistant', content: reply });
        await saveMessage('assistant', reply);

      } catch (err) {
        console.error('API Error:', err);
        appendMessage('elara', 'Maaf, terjadi kesalahan. Coba lagi ya! 🙏');
      }

      setLoading(false);
    };

    // ==============================
    // APPEND PESAN KE CHATBOX
    // ==============================
    function appendMessage(role, text) {
      const chatBox = document.getElementById('chatBox');
      const div     = document.createElement('div');

      const now  = new Date();
      const time = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

      if (role === 'user') {
        div.className = 'message user-msg';
        div.innerHTML = `
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="msg-time">${time}</div>
        `;
      } else {
        div.className = 'message elara-msg';
        div.innerHTML = `
          <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
          <div class="msg-time">Elara · ${time}</div>
        `;
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ==============================
    // LOADING STATE
    // ==============================
    function setLoading(loading) {
      const btn    = document.getElementById('sendBtn');
      const status = document.getElementById('elaraStatus');
      const chatBox = document.getElementById('chatBox');

      if (loading) {
        btn.disabled = true;
        status.textContent = 'Mengetik...';

        // Tambah bubble loading
        const loadDiv = document.createElement('div');
        loadDiv.className = 'message elara-msg';
        loadDiv.id = 'loadingBubble';
        loadDiv.innerHTML = `
          <div class="bubble typing">
            <span></span><span></span><span></span>
          </div>`;
        chatBox.appendChild(loadDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

      } else {
        btn.disabled = false;
        status.textContent = 'Pareffi Assistant';
        document.getElementById('loadingBubble')?.remove();
      }
    }

    // ==============================
    // CLEAR CHAT
    // ==============================
    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!confirm('Hapus semua riwayat chat?')) return;
      const chatBox = document.getElementById('chatBox');
      chatBox.innerHTML = `
        <div class="message elara-msg">
          <div class="bubble">
            Halo lagi! Ada yang ingin kamu tanyakan tentang parfum? 🌸
          </div>
          <div class="msg-time">Elara</div>
        </div>`;
      chatHistory = [];
    });

    // ==============================
    // HELPER
    // ==============================
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    window.autoResize = function(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    };

    // Event listeners input
    const input = document.getElementById('userInput');
    input.addEventListener('input', () => autoResize(input));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

  </script>
</body>
</html>
